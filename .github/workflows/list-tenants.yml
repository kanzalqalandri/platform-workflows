name: List Tenants (reusable)
on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
    secrets:
      PLATFORM_CONFIG_TOKEN:
        required: true

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout platform-config
        uses: actions/checkout@v4
        with:
          repository: kanzalqalandri/platform-config
          token: ${{ secrets.PLATFORM_CONFIG_TOKEN }}

      - name: List tenants
        run: |
          echo "### Tenants running ${{ inputs.app }} (cluster / tenant)" >> $GITHUB_STEP_SUMMARY
          for d in tenants/*/*/${{ inputs.app }}; do
            [ -d "$d" ] || continue
            CLUSTER=$(echo "$d" | cut -d/ -f2)
            TENANT=$(echo "$d" | cut -d/ -f3)
            echo "- \`$CLUSTER\` / \`$TENANT\`" >> $GITHUB_STEP_SUMMARY
          done

name: List Deployments (reusable)
on:
  workflow_call:
    inputs:
      plane:
        description: 'Config plane: tenants | powergrader'
        required: false
        default: tenants
        type: string
      app:
        required: true
        type: string
    secrets:
      PLATFORM_CONFIG_TOKEN:
        required: true

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout platform-config
        uses: actions/checkout@v4
        with:
          repository: kanzalqalandri/platform-config
          token: ${{ secrets.PLATFORM_CONFIG_TOKEN }}

      - name: List
        run: |
          echo "### ${{ inputs.plane }} deployments of ${{ inputs.app }} (cluster / target)" >> $GITHUB_STEP_SUMMARY
          FOUND=0
          for d in ${{ inputs.plane }}/*/*/${{ inputs.app }}; do
            [ -d "$d" ] || continue
            FOUND=1
            echo "- \`$(echo "$d" | cut -d/ -f2)\` / \`$(echo "$d" | cut -d/ -f3)\`" >> $GITHUB_STEP_SUMMARY
          done
          [ "$FOUND" = 0 ] && echo "_(none — is the plane correct?)_" >> $GITHUB_STEP_SUMMARY || true

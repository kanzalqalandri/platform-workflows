name: Offboard (reusable)
on:
  workflow_call:
    inputs:
      plane:
        description: 'Config plane: tenants | powergrader'
        required: false
        default: tenants
        type: string
      key:
        description: 'Middle path segment — tenant id (tenants) or env (powergrader)'
        required: true
        type: string
      app:
        required: true
        type: string
    secrets:
      PLATFORM_CONFIG_TOKEN:
        required: true

# Lifecycle & Cleanup pillar: offboarding is symmetric with deploy.
# Deleting the directory removes the config.yaml -> the ApplicationSet deletes the
# generated Application -> its resources-finalizer cascades the k8s cleanup.
# Plane-aware: <plane>/<cluster>/<key>/<app>/ (tenants: key=tenant; powergrader: key=env).
jobs:
  offboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout platform-config
        uses: actions/checkout@v4
        with:
          repository: kanzalqalandri/platform-config
          token: ${{ secrets.PLATFORM_CONFIG_TOKEN }}

      - name: Validate plane
        run: |
          case "${{ inputs.plane }}" in
            tenants|powergrader) : ;;
            *) echo "::error::Unknown plane '${{ inputs.plane }}' (allowed: tenants, powergrader)"; exit 1 ;;
          esac

      - name: Locate and remove directory
        id: loc
        run: |
          DIR=$(ls -d ${{ inputs.plane }}/*/${{ inputs.key }}/${{ inputs.app }} 2>/dev/null | head -1 || true)
          if [ -z "$DIR" ]; then
            echo "::warning::Nothing to offboard: ${{ inputs.plane }}/*/${{ inputs.key }}/${{ inputs.app }} not found"
            exit 0
          fi
          echo "cluster=$(echo "$DIR" | cut -d/ -f2)" >> $GITHUB_OUTPUT
          git rm -r "$DIR"

      - name: Commit and push
        env:
          ACTOR: ${{ github.triggering_actor }}
          ACTOR_ID: ${{ github.actor_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CLUSTER: ${{ steps.loc.outputs.cluster }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit \
            --author="${ACTOR} <${ACTOR_ID}+${ACTOR}@users.noreply.github.com>" \
            -m "offboard(${{ inputs.plane }}/${CLUSTER}): ${{ inputs.app }} from ${{ inputs.key }}" \
            -m "Triggered-by: @${ACTOR}" \
            -m "Source-run: ${RUN_URL}"
          git push

name: Deploy (reusable)
on:
  workflow_call:
    inputs:
      tenant:
        required: true
        type: string
      app:
        required: true
        type: string
      image_tag:
        required: true
        type: string
    secrets:
      PLATFORM_CONFIG_TOKEN:
        description: 'Token with write access to platform-config'
        required: true

# Platform-owned CD. Engineers cannot modify this. It only ever writes values.yaml
# and commits — it never assumes what the chart renders (keeps the design modular).
# Layout: tenants/<cluster>/<tenant>/<app>/values.yaml — the workflow auto-locates
# the tenant across clusters, so the caller only supplies tenant + app + image_tag.
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout platform-config
        uses: actions/checkout@v4
        with:
          repository: kanzalqalandri/platform-config
          token: ${{ secrets.PLATFORM_CONFIG_TOKEN }}

      - name: Locate tenant values file
        id: loc
        run: |
          MATCHES=$(ls tenants/*/${{ inputs.tenant }}/${{ inputs.app }}/values.yaml 2>/dev/null || true)
          COUNT=$(printf '%s\n' "$MATCHES" | grep -c . || true)
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No values file for tenant '${{ inputs.tenant }}' app '${{ inputs.app }}'."
            echo "Known <cluster>/<tenant> pairs:"; ls -d tenants/*/*/ 2>/dev/null | sed 's#tenants/##;s#/$##'
            exit 1
          fi
          if [ "$COUNT" -gt 1 ]; then
            echo "::error::Tenant '${{ inputs.tenant }}' exists on multiple clusters:"; echo "$MATCHES"
            exit 1
          fi
          CLUSTER=$(echo "$MATCHES" | cut -d/ -f2)
          echo "vf=$MATCHES" >> $GITHUB_OUTPUT
          echo "cluster=$CLUSTER" >> $GITHUB_OUTPUT
          echo "Resolved ${{ inputs.tenant }}/${{ inputs.app }} -> $MATCHES (cluster: $CLUSTER)"

      - name: Update image tag
        run: |
          yq -i '.image.tag = "${{ inputs.image_tag }}"' "${{ steps.loc.outputs.vf }}"
          echo "Updated ${{ steps.loc.outputs.vf }}:"; cat "${{ steps.loc.outputs.vf }}"

      - name: Commit and push
        env:
          # github.triggering_actor = the human who clicked "Run workflow" (accurate on re-runs too)
          ACTOR: ${{ github.triggering_actor }}
          ACTOR_ID: ${{ github.actor_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CLUSTER: ${{ steps.loc.outputs.cluster }}
        run: |
          # committer = the automation; author = the human who requested it (attribution)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit \
            --author="${ACTOR} <${ACTOR_ID}+${ACTOR}@users.noreply.github.com>" \
            -m "deploy(${CLUSTER}): ${{ inputs.app }}@${{ inputs.image_tag }} -> ${{ inputs.tenant }}" \
            -m "Triggered-by: @${ACTOR}" \
            -m "Source-run: ${RUN_URL}"
          git push

      - name: Summary
        run: |
          echo "## Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **App:** ${{ inputs.app }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tenant:** ${{ inputs.tenant }} (cluster: ${{ steps.loc.outputs.cluster }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Image tag:** ${{ inputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** @${{ github.triggering_actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ArgoCD will auto-sync the committed change onto the cluster." >> $GITHUB_STEP_SUMMARY

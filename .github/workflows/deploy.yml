name: Deploy (reusable)
on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      tenant:
        required: true
        type: string
      app:
        required: true
        type: string
      image_tag:
        required: true
        type: string
    secrets:
      PLATFORM_CONFIG_TOKEN:
        description: 'Token with write access to platform-config'
        required: true

# Platform-owned CD. Engineers cannot modify this. It only ever writes values.yaml
# and commits — it never assumes what the chart renders (keeps the design modular).
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout platform-config
        uses: actions/checkout@v4
        with:
          repository: kanzalqalandri/platform-config
          token: ${{ secrets.PLATFORM_CONFIG_TOKEN }}

      - name: Validate tenant/app exists (server-side)
        run: |
          DIR="envs/${{ inputs.environment }}/${{ inputs.tenant }}/${{ inputs.app }}"
          if [ ! -d "$DIR" ]; then
            echo "::error::Not found: $DIR"
            echo "Available tenants in ${{ inputs.environment }} for ${{ inputs.app }}:"
            for d in envs/${{ inputs.environment }}/*/${{ inputs.app }}; do
              [ -d "$d" ] && basename "$(dirname "$d")"
            done
            exit 1
          fi

      - name: Update image tag
        run: |
          VF="envs/${{ inputs.environment }}/${{ inputs.tenant }}/${{ inputs.app }}/values.yaml"
          yq -i '.image.tag = "${{ inputs.image_tag }}"' "$VF"
          echo "Updated $VF:"; cat "$VF"

      - name: Commit and push
        env:
          # github.triggering_actor = the human who clicked "Run workflow" (accurate on re-runs too)
          ACTOR: ${{ github.triggering_actor }}
          ACTOR_ID: ${{ github.actor_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # committer = the automation; author = the human who requested it (attribution)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit \
            --author="${ACTOR} <${ACTOR_ID}+${ACTOR}@users.noreply.github.com>" \
            -m "deploy(${{ inputs.environment }}): ${{ inputs.app }}@${{ inputs.image_tag }} -> ${{ inputs.tenant }}" \
            -m "Triggered-by: @${ACTOR}" \
            -m "Source-run: ${RUN_URL}"
          git push

      - name: Summary
        run: |
          echo "## Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **App:** ${{ inputs.app }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tenant:** ${{ inputs.tenant }} (${{ inputs.environment }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Image tag:** ${{ inputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** @${{ github.triggering_actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ArgoCD will auto-sync the committed change onto the cluster." >> $GITHUB_STEP_SUMMARY

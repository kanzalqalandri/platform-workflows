name: Deploy (reusable)
on:
  workflow_call:
    inputs:
      plane:
        description: 'Config plane: tenants | powergrader'
        required: false
        default: tenants
        type: string
      key:
        description: 'Middle path segment — tenant id (tenants) or env (powergrader)'
        required: true
        type: string
      app:
        required: true
        type: string
      image_tag:
        required: true
        type: string
    secrets:
      PLATFORM_CONFIG_TOKEN:
        description: 'Token with write access to platform-config'
        required: true

# Platform-owned CD. Plane-aware: works for any plane laid out as
# <plane>/<cluster>/<key>/<app>/ (tenants: key=tenant; powergrader: key=env).
# It only ever writes values.yaml and commits.
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout platform-config
        uses: actions/checkout@v4
        with:
          repository: kanzalqalandri/platform-config
          token: ${{ secrets.PLATFORM_CONFIG_TOKEN }}

      - name: Validate plane
        run: |
          case "${{ inputs.plane }}" in
            tenants|powergrader) : ;;
            *) echo "::error::Unknown plane '${{ inputs.plane }}' (allowed: tenants, powergrader)"; exit 1 ;;
          esac

      - name: Locate values file
        id: loc
        run: |
          MATCHES=$(ls ${{ inputs.plane }}/*/${{ inputs.key }}/${{ inputs.app }}/values.yaml 2>/dev/null || true)
          COUNT=$(printf '%s\n' "$MATCHES" | grep -c . || true)
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No values file for ${{ inputs.plane }}/*/${{ inputs.key }}/${{ inputs.app }}"
            echo "Known <cluster>/<key> for ${{ inputs.app }} in plane ${{ inputs.plane }}:"
            ls -d ${{ inputs.plane }}/*/*/${{ inputs.app }} 2>/dev/null | sed "s#${{ inputs.plane }}/##;s#/${{ inputs.app }}##"
            exit 1
          fi
          if [ "$COUNT" -gt 1 ]; then
            echo "::error::'${{ inputs.key }}' matches multiple clusters:"; echo "$MATCHES"; exit 1
          fi
          echo "vf=$MATCHES" >> $GITHUB_OUTPUT
          echo "cluster=$(echo "$MATCHES" | cut -d/ -f2)" >> $GITHUB_OUTPUT
          echo "Resolved ${{ inputs.plane }}/${{ inputs.key }}/${{ inputs.app }} -> $MATCHES"

      - name: Update image tag
        run: |
          yq -i '.image.tag = "${{ inputs.image_tag }}"' "${{ steps.loc.outputs.vf }}"
          echo "Updated ${{ steps.loc.outputs.vf }}:"; cat "${{ steps.loc.outputs.vf }}"

      - name: Commit and push
        env:
          ACTOR: ${{ github.triggering_actor }}
          ACTOR_ID: ${{ github.actor_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CLUSTER: ${{ steps.loc.outputs.cluster }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit \
            --author="${ACTOR} <${ACTOR_ID}+${ACTOR}@users.noreply.github.com>" \
            -m "deploy(${{ inputs.plane }}/${CLUSTER}): ${{ inputs.app }}@${{ inputs.image_tag }} -> ${{ inputs.key }}" \
            -m "Triggered-by: @${ACTOR}" \
            -m "Source-run: ${RUN_URL}"
          git push

      - name: Summary
        run: |
          echo "## Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Plane:** ${{ inputs.plane }}" >> $GITHUB_STEP_SUMMARY
          echo "- **App:** ${{ inputs.app }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target:** ${{ inputs.key }} (cluster: ${{ steps.loc.outputs.cluster }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Image tag:** ${{ inputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** @${{ github.triggering_actor }}" >> $GITHUB_STEP_SUMMARY
